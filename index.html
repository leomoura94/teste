<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Show do Service Desk PRO</title>

<style>
body {
  font-family: Arial;
  background: #0d1b2a;
  color: white;
  text-align: center;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

h1 { color: #ffd60a; }

.question { font-size: 20px; margin: 20px 0; }

.answers button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #1b263b;
  color: white;
  cursor: pointer;
}

.answers button:hover { background: #415a77; }

.correct { background: #2ecc71 !important; }
.wrong { background: #e63946 !important; }

.btn {
  margin: 5px;
  padding: 10px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: #ffd60a;
  font-weight: bold;
}

.timer { font-size: 18px; margin: 10px; }
.prize { font-size: 18px; color: #90ee90; }

.ranking {
  margin-top: 20px;
  text-align: left;
}
</style>

</head>
<body>

<div class="container">
  <h1>🎮 Show do Service Desk PRO</h1>

  <input id="playerName" placeholder="Seu nome" />

  <div class="timer">⏱️ Tempo: <span id="time">30</span>s</div>
  <div class="prize">💰 Prêmio: <span id="prize">0</span></div>

  <div class="question" id="question"></div>
  <div class="answers" id="answers"></div>

  <button class="btn" onclick="useHelp()">🆘 Eliminar 2</button>
  <button class="btn" onclick="nextQuestion()">➡️ Próxima</button>

  <div id="result"></div>

  <div class="ranking">
    <h3>🏆 Ranking</h3>
    <ul id="ranking"></ul>
  </div>
</div>

<script>
const questions = [
  {
    q: "O que define um incidente?",
    a: [
      "Falha técnica",
      "Interrupção ou degradação de serviço",
      "Evento futuro",
      "Solicitação"
    ],
    correct: 1,
    prize: 1000
  },
  {
    q: "Papel do Service Desk?",
    a: [
      "Resolver tudo",
      "Encaminhar",
      "Restaurar serviço sendo ponto único",
      "Monitorar"
    ],
    correct: 2,
    prize: 2000
  },
  {
    q: "O que é problema?",
    a: [
      "Erro isolado",
      "Falha crítica",
      "Causa raiz de incidentes",
      "Mudança"
    ],
    correct: 2,
    prize: 5000
  },
  {
    q: "Prioridade é definida por?",
    a: [
      "Tempo",
      "Impacto + urgência",
      "Usuário",
      "Sistema"
    ],
    correct: 1,
    prize: 10000
  },
  {
    q: "Melhor ação para recorrência?",
    a: [
      "Ignorar",
      "Resolver sempre",
      "Abrir problema",
      "Escalar"
    ],
    correct: 2,
    prize: 20000
  }
];

let current = 0;
let score = 0;
let timer;
let timeLeft = 30;
let helpUsed = false;

function loadQuestion() {
  resetTimer();

  const q = questions[current];
  document.getElementById("question").innerText = q.q;
  document.getElementById("prize").innerText = q.prize;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.a.forEach((ans, i) => {
    const btn = document.createElement("button");
    btn.innerText = ans;
    btn.onclick = () => checkAnswer(btn, i);
    answersDiv.appendChild(btn);
  });
}

function checkAnswer(btn, index) {
  clearInterval(timer);

  const correct = questions[current].correct;
  const buttons = document.querySelectorAll(".answers button");

  buttons.forEach(b => b.disabled = true);

  if (index === correct) {
    btn.classList.add("correct");
    score = questions[current].prize;
  } else {
    btn.classList.add("wrong");
    buttons[correct].classList.add("correct");
  }
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    endGame();
    return;
  }
  loadQuestion();
}

function useHelp() {
  if (helpUsed) return;
  helpUsed = true;

  const correct = questions[current].correct;
  const buttons = document.querySelectorAll(".answers button");

  let removed = 0;

  buttons.forEach((btn, i) => {
    if (i !== correct && removed < 2) {
      btn.style.display = "none";
      removed++;
    }
  });
}

function resetTimer() {
  clearInterval(timer);
  timeLeft = 30;
  document.getElementById("time").innerText = timeLeft;

  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("time").innerText = timeLeft;

    if (timeLeft <= 0) {
      clearInterval(timer);
      nextQuestion();
    }
  }, 1000);
}

function endGame() {
  document.getElementById("question").innerText = "Fim do jogo!";
  document.getElementById("answers").innerHTML = "";
  document.getElementById("result").innerText = "Pontuação final: " + score;

  saveRanking();
  loadRanking();
}

function saveRanking() {
  const name = document.getElementById("playerName").value || "Anon";

  let ranking = JSON.parse(localStorage.getItem("ranking")) || [];

  ranking.push({ name, score });

  ranking.sort((a, b) => b.score - a.score);
  ranking = ranking.slice(0, 5);

  localStorage.setItem("ranking", JSON.stringify(ranking));
}

function loadRanking() {
  const ranking = JSON.parse(localStorage.getItem("ranking")) || [];
  const ul = document.getElementById("ranking");
  ul.innerHTML = "";

  ranking.forEach(r => {
    const li = document.createElement("li");
    li.innerText = `${r.name} - ${r.score}`;
    ul.appendChild(li);
  });
}

loadRanking();
loadQuestion();
</script>

</body>
</html>
