<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Show do Service Desk - Hard Mode</title>

<style>
body {
  font-family: Arial;
  background: #0d1b2a;
  color: white;
  text-align: center;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

h1 { color: #ffd60a; }

.question { font-size: 20px; margin: 20px 0; }

.answers button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #1b263b;
  color: white;
  cursor: pointer;
}

.answers button:hover { background: #415a77; }

.correct { background: #2ecc71 !important; }
.wrong { background: #e63946 !important; }

.btn {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: #ffd60a;
  font-weight: bold;
}

.timer {
  font-size: 18px;
  margin: 10px;
}

.score {
  font-size: 18px;
  margin-top: 10px;
}
</style>

</head>
<body>

<div class="container">
  <h1>🎮 Show do Service Desk - Hard Mode</h1>

  <div id="level"></div>
  <div class="timer">⏱️ Tempo: <span id="time">30</span>s</div>

  <div class="question" id="question"></div>
  <div class="answers" id="answers"></div>

  <button class="btn" onclick="nextQuestion()">➡️ Próxima</button>

  <div class="score">Pontuação: <span id="score">0</span></div>
</div>

<script>
const questions = [

  { level:"🟢", q:"Um usuário relata lentidão intermitente. Qual a melhor classificação inicial?",
    a:["Problema","Incidente","Mudança","Evento"],
    correct:1 },

  { level:"🟢", q:"Qual ação agrega mais valor no primeiro atendimento N1?",
    a:["Escalar rapidamente","Restaurar serviço parcialmente e coletar dados","Aguardar usuário","Encerrar ticket"],
    correct:1 },

  { level:"🟡", q:"Um ticket foi escalado sem evidência. Qual o maior impacto?",
    a:["Atraso na resolução","Aumento de SLA","Erro técnico","Falha de sistema"],
    correct:0 },

  { level:"🟡", q:"Qual cenário indica falha de triagem?",
    a:["Reclassificação posterior","Escalonamento correto","Categoria errada causando fila incorreta","Uso de workaround"],
    correct:2 },

  { level:"🟡", q:"Qual prática reduz retrabalho entre N1 e N2?",
    a:["Escalar rápido","Padronizar coleta de dados","Aumentar SLA","Reduzir comunicação"],
    correct:1 },

  { level:"🔴", q:"Um incidente foi resolvido, mas retorna frequentemente. Qual falha ocorreu?",
    a:["Incident Management","Problem Management","Change Management","Request Fulfillment"],
    correct:1 },

  { level:"🔴", q:"Qual decisão do N2 demonstra maturidade operacional?",
    a:["Resolver e fechar","Documentar workaround e abrir problema","Escalar fornecedor direto","Aumentar prioridade"],
    correct:1 },

  { level:"🔴", q:"Qual é o risco de priorizar apenas SLA e não impacto?",
    a:["Baixo desempenho","Resolver problema errado primeiro","Mais tickets","Erro humano"],
    correct:1 },

  { level:"🏁", q:"Um incidente crítico foi resolvido sem registro detalhado. Qual consequência?",
    a:["Nenhuma","Perda de conhecimento organizacional","Melhora SLA","Redução de backlog"],
    correct:1 },

  { level:"🏁", q:"Qual indicador melhor mostra maturidade do Service Desk?",
    a:["Volume de tickets","Tempo médio","Taxa de reabertura e base de conhecimento","Quantidade de analistas"],
    correct:2 }

];

let current = 0;
let score = 0;
let timer;
let timeLeft = 30;

function loadQuestion() {
  resetTimer();

  const q = questions[current];
  document.getElementById("level").innerText = q.level;
  document.getElementById("question").innerText = q.q;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.a.forEach((ans, i) => {
    const btn = document.createElement("button");
    btn.innerText = ans;
    btn.onclick = () => checkAnswer(btn, i);
    answersDiv.appendChild(btn);
  });
}

function checkAnswer(btn, index) {
  clearInterval(timer);

  const correct = questions[current].correct;
  const buttons = document.querySelectorAll(".answers button");

  buttons.forEach(b => b.disabled = true);

  if (index === correct) {
    btn.classList.add("correct");
    score++;
  } else {
    btn.classList.add("wrong");
    buttons[correct].classList.add("correct");
    score--;
  }

  document.getElementById("score").innerText = score;
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    document.getElementById("question").innerText = "Fim do jogo!";
    document.getElementById("answers").innerHTML = "";
    return;
  }
  loadQuestion();
}

function resetTimer() {
  clearInterval(timer);
  timeLeft = 30;
  document.getElementById("time").innerText = timeLeft;

  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("time").innerText = timeLeft;

    if (timeLeft <= 0) {
      clearInterval(timer);
      nextQuestion();
    }
  }, 1000);
}

loadQuestion();
</script>

</body>
</html>
