<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Show do Service Desk</title>

<style>
body {
  font-family: Arial;
  background: #0d1b2a;
  color: white;
  text-align: center;
}

.container {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}

h1 { color: #ffd60a; }

.question { font-size: 20px; margin: 20px 0; }

.answers button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #1b263b;
  color: white;
  cursor: pointer;
}

.answers button:hover { background: #415a77; }

.correct { background: #2ecc71 !important; }
.wrong { background: #e63946 !important; }

.btn {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  background: #ffd60a;
  font-weight: bold;
}

.timer {
  font-size: 18px;
  margin: 10px;
}

.score {
  font-size: 18px;
  margin-top: 10px;
}
</style>

</head>
<body>

<div class="container">
  <h1>🎮 Show do Service Desk</h1>

  <div id="level"></div>
  <div class="timer">⏱️ Tempo: <span id="time">30</span>s</div>

  <div class="question" id="question"></div>
  <div class="answers" id="answers"></div>

  <button class="btn" onclick="nextQuestion()">➡️ Próxima</button>

  <div class="score">Pontuação: <span id="score">0</span></div>
</div>

<script>
const questions = [
  { level:"🟢 Fácil", q:"O que melhor define um incidente?",
    a:["Qualquer falha em TI","Interrupção ou degradação não planejada de serviço","Evento futuro","Solicitação"],
    correct:1 },

  { level:"🟢 Fácil", q:"Qual é o papel MAIS correto do Service Desk?",
    a:["Resolver tudo","Registrar e encaminhar","Restaurar serviço sendo ponto único","Monitorar"],
    correct:2 },

  { level:"🟢 Fácil", q:"Sobre SLA, qual afirmação está correta?",
    a:["Só tempo de resposta","Tempo baseado em impacto e urgência","Igual para todos","Só críticos"],
    correct:1 },

  { level:"🟢 Fácil", q:"Antes de escalar, o N1 deve:",
    a:["Escalar direto","Testar aleatório","Seguir KB + coletar evidências","Ignorar"],
    correct:2 },

  { level:"🟡 Médio", q:"O que representa melhor um problema?",
    a:["Erro isolado","Servidor fora","Incidentes recorrentes sem causa","Solicitação"],
    correct:2 },

  { level:"🟡 Médio", q:"Workaround é:",
    a:["Solução definitiva","Correção permanente","Solução temporária sem causa raiz","Mudança"],
    correct:2 },

  { level:"🟡 Médio", q:"Ticket bem preparado contém:",
    a:["Texto longo","Print apenas","Contexto + evidência + testes","Prioridade alta"],
    correct:2 },

  { level:"🔴 Difícil", q:"Prioridade é definida por:",
    a:["Tempo","Impacto + urgência","Sistema","Usuário"],
    correct:1 },

  { level:"🔴 Difícil", q:"Incidente vira problema quando:",
    a:["Demora","Usuário reclama","É recorrente ou causa desconhecida","É crítico"],
    correct:2 },

  { level:"🔴 Difícil", q:"Melhor ação para recorrência:",
    a:["Resolver sempre","Ignorar","Abrir problema e buscar causa raiz","Escalar"],
    correct:2 },

  { level:"🏁 Especialista", q:"Falha no Incident Management:",
    a:["Dentro do SLA","Escalonado correto","Reabertura por falta de validação","Reclassificação"],
    correct:2 }
];

let current = 0;
let score = 0;
let timer;
let timeLeft = 30;

function loadQuestion() {
  resetTimer();

  const q = questions[current];
  document.getElementById("level").innerText = q.level;
  document.getElementById("question").innerText = q.q;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.a.forEach((ans, i) => {
    const btn = document.createElement("button");
    btn.innerText = ans;
    btn.onclick = () => checkAnswer(btn, i);
    answersDiv.appendChild(btn);
  });
}

function checkAnswer(btn, index) {
  clearInterval(timer);

  const correct = questions[current].correct;
  const buttons = document.querySelectorAll(".answers button");

  buttons.forEach(b => b.disabled = true);

  if (index === correct) {
    btn.classList.add("correct");
    score++;
  } else {
    btn.classList.add("wrong");
    buttons[correct].classList.add("correct");
    score--;
  }

  document.getElementById("score").innerText = score;
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    document.getElementById("question").innerText = "Fim do jogo!";
    document.getElementById("answers").innerHTML = "";
    return;
  }
  loadQuestion();
}

function resetTimer() {
  clearInterval(timer);
  timeLeft = 30;
  document.getElementById("time").innerText = timeLeft;

  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("time").innerText = timeLeft;

    if (timeLeft <= 0) {
      clearInterval(timer);
      nextQuestion();
    }
  }, 1000);
}

loadQuestion();
</script>

</body>
</html>
